<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="920" viewBox="0 0 1700 920">
  <defs>
    <style>
      .bg{fill:#050505}.grid{stroke:#1d1d1d;stroke-width:1}.box{fill:#090909;stroke:#eee;stroke-width:2}.face{fill:#0d0d0d;stroke:#777;stroke-width:1.3}.hot{fill:#111;stroke:#fff;stroke-width:3}.line{fill:none;stroke:#aaa;stroke-width:2}.flow{fill:none;stroke:#fff;stroke-width:3;marker-end:url(#a)}.dash{fill:none;stroke:#666;stroke-width:1.5;stroke-dasharray:7 7}.h{fill:#fff;font:700 32px 'DejaVu Sans Mono',monospace}.t{fill:#f3f3f3;font:22px 'DejaVu Sans Mono',monospace}.s{fill:#b7b7b7;font:17px 'DejaVu Sans Mono',monospace}.xs{fill:#8d8d8d;font:15px 'DejaVu Sans Mono',monospace}.glow{filter:url(#g)}
    </style>
    <marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6 0 12z" fill="#fff"/></marker>
    <filter id="g"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="p" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" class="grid" fill="none"/></pattern>
  </defs>
  <rect width="1700" height="920" class="bg"/>
  <rect x="24" y="24" width="1652" height="872" fill="url(#p)" opacity=".55"/>
  <text x="70" y="82" class="h">FF2 DIRECT REDUCTION / NO EXPERT OUTPUT SCRATCH</text>
  <text x="70" y="116" class="s">packed expert rows compute locally; inverse routing selects the final token address</text>

  <!-- expert tiles -->
  <g>
    <polygon points="80,230 340,230 380,195 120,195" class="face"/>
    <rect x="80" y="230" width="260" height="180" class="box"/>
    <polygon points="340,230 380,195 380,375 340,410" class="face"/>
    <text x="120" y="278" class="t">expert e2 / p0</text>
    <text x="120" y="319" class="s">W2 x Y4</text>
    <text x="120" y="354" class="s">H512 tile</text>

    <polygon points="80,520 340,520 380,485 120,485" class="face"/>
    <rect x="80" y="520" width="260" height="180" class="box"/>
    <polygon points="340,520 380,485 380,665 340,700" class="face"/>
    <text x="120" y="568" class="t">expert e9 / p0</text>
    <text x="120" y="609" class="s">W2 x Y4</text>
    <text x="120" y="644" class="s">H512 tile</text>
  </g>

  <!-- inverse lookup -->
  <rect x="485" y="305" width="360" height="300" class="hot glow"/>
  <text x="525" y="357" class="t">INVERSE ROUTE</text>
  <text x="525" y="405" class="s">token = token_idx[e,1+p]</text>
  <line x1="520" y1="435" x2="810" y2="435" class="dash"/>
  <text x="525" y="480" class="s">e2,p0 -> token 000</text>
  <text x="525" y="520" class="s">e9,p0 -> token 000</text>
  <text x="525" y="560" class="xs">same destination row</text>
  <path d="M380 320 H485" class="flow"/>
  <path d="M380 610 C430 610 440 530 485 530" class="flow"/>

  <!-- shared issue slots -->
  <polygon points="935,210 1235,210 1275,175 975,175" class="face"/>
  <rect x="935" y="210" width="300" height="240" class="hot glow"/>
  <polygon points="1235,210 1275,175 1275,415 1235,450" class="face"/>
  <text x="975" y="258" class="t">SHARED ISSUE TILE</text>
  <text x="975" y="301" class="s">stmatrix x2</text>
  <text x="975" y="338" class="s">8 tokens x H16</text>
  <text x="975" y="375" class="s">16 lanes x 16B</text>
  <text x="975" y="412" class="xs">four N8 slots / pair</text>
  <path d="M845 455 H935" class="flow"/>

  <rect x="930" y="560" width="360" height="150" class="box"/>
  <text x="970" y="606" class="t">ASYNC PROXY ORDER</text>
  <text x="970" y="646" class="s">fence.proxy.async.shared::cta</text>
  <text x="970" y="679" class="s">commit -> wait_group.read 0</text>
  <path d="M1085 450 V560" class="flow"/>

  <!-- output -->
  <polygon points="1390,260 1590,260 1630,225 1430,225" class="face"/>
  <rect x="1390" y="260" width="200" height="410" class="box"/>
  <polygon points="1590,260 1630,225 1630,635 1590,670" class="face"/>
  <text x="1435" y="308" class="t">Y [N,H]</text>
  <line x1="1415" y1="335" x2="1565" y2="335" class="dash"/>
  <rect x="1425" y="365" width="130" height="55" class="hot"/>
  <text x="1445" y="399" class="s">token 000</text>
  <rect x="1425" y="438" width="130" height="55" class="face"/>
  <text x="1445" y="472" class="s">token 001</text>
  <rect x="1425" y="511" width="130" height="55" class="face"/>
  <text x="1445" y="545" class="s">token 002</text>
  <text x="1430" y="620" class="xs">zero before graph</text>

  <path d="M1275 330 H1390" class="flow"/>
  <path d="M1290 635 C1340 635 1340 480 1390 480" class="flow"/>
  <rect x="1250" y="360" width="130" height="62" class="hot glow"/>
  <text x="1265" y="385" class="xs">cp.reduce</text>
  <text x="1265" y="407" class="xs">add.bf16</text>

  <text x="75" y="790" class="t">THE POINT</text>
  <text x="75" y="830" class="s">expert identity exists through FF2; only the reduction tail resolves token identity</text>
  <text x="75" y="865" class="xs">no [expert,token,H] output tensor  |  no separate unpermute kernel  |  no atomicAdd loop</text>
</svg>
