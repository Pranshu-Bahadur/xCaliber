  <polygon points="950,545 1245,545 1295,505 1000,505" class="soft"/>
  <polygon points="950,545 1245,545 1245,795 950,795" class="hot glow"/>
  <polygon points="1245,545 1295,505 1295,755 1245,795" class="soft"/>
  <text x="994" y="592" class="t">CTA1024 / EXPERT</text>
  <line x1="980" y1="620" x2="1215" y2="620" class="dim"/>
  <text x="1008" y="662" class="t">W4A4 FF1</text>
  <text x="1008" y="700" class="s">4 N8 MMAs / pair</text>
  <text x="1008" y="737" class="t">SwiGLU x topk_W</text>
  <text x="1008" y="770" class="xs">Y4 / SY emitted</text>
  <path d="M1090 415 V505" class="flow"/>

  <rect x="1380" y="265" width="330" height="240" class="hot glow"/>
  <text x="1422" y="316" class="t">W4A4 FF2</text>
  <text x="1422" y="361" class="s">packed Y4 / SY</text>
  <text x="1422" y="396" class="s">W2 / S2 direct</text>
  <text x="1422" y="431" class="s">H512 / CTA</text>
  <rect x="1415" y="451" width="260" height="32" class="tag"/>
  <text x="1433" y="474" class="xs">64 regs / 0 spills</text>
  <path d="M1295 675 C1360 675 1345 385 1380 385" class="flow"/>

  <polygon points="1390,650 1650,650 1700,610 1440,610" class="soft"/>
  <polygon points="1390,650 1650,650 1650,820 1390,820" class="edge"/>
  <polygon points="1650,650 1700,610 1700,780 1650,820" class="soft"/>
  <text x="1430" y="702" class="t">Y [N,H] BF16</text>
  <text x="1430" y="746" class="s">token-major</text>
  <text x="1430" y="784" class="s">expert sum complete</text>
  <path d="M1545 505 V610" class="flow"/>
  <rect x="1400" y="540" width="290" height="38" class="tag glow"/>
  <text x="1420" y="566" class="s">cp.reduce / 16B issuers</text>

  <text x="80" y="890" class="s">188 SM  |  one resident expert CTA / SM  |  empty expert returns before weight traffic</text>
  <text x="80" y="925" class="xs">graph: (absmax + route rank) -> expert scatter -> FF1 -> FF2 -> direct token reduction</text>
</svg>
