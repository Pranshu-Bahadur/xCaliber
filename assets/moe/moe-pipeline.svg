<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <style>
      .bg{fill:#050505}.grid{stroke:#202020;stroke-width:1}.edge{fill:#090909;stroke:#f4f4f4;stroke-width:2}.soft{fill:#0b0b0b;stroke:#7f7f7f;stroke-width:1.4}.hot{fill:#111;stroke:#fff;stroke-width:3}.wire{fill:none;stroke:#d8d8d8;stroke-width:2}.dim{fill:none;stroke:#606060;stroke-width:1.5;stroke-dasharray:8 8}.flow{fill:none;stroke:#fff;stroke-width:3;marker-end:url(#arrow)}.minor{fill:none;stroke:#8b8b8b;stroke-width:2;marker-end:url(#arrow2)}.t{fill:#f5f5f5;font:24px 'DejaVu Sans Mono',monospace}.h{fill:#fff;font:700 34px 'DejaVu Sans Mono',monospace}.s{fill:#bdbdbd;font:19px 'DejaVu Sans Mono',monospace}.xs{fill:#929292;font:16px 'DejaVu Sans Mono',monospace}.tag{fill:#050505;stroke:#fff;stroke-width:1.5}.glow{filter:url(#glow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#fff"/></marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#8b8b8b"/></marker>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="microgrid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" class="grid" fill="none"/></pattern>
  </defs>
  <rect width="1800" height="980" class="bg"/>
  <rect x="24" y="24" width="1752" height="932" fill="url(#microgrid)" opacity=".55"/>
