  <text x="80" y="122" class="s">scatter once  |  native tiles thereafter  |  direct hardware reduction</text>

  <!-- input planes -->
  <polygon points="75,245 355,245 405,205 125,205" class="soft"/>
  <polygon points="75,245 355,245 355,395 75,395" class="edge"/>
  <polygon points="355,245 405,205 405,355 355,395" class="soft"/>
