  <rect x="500" y="180" width="300" height="250" class="hot glow"/>
  <text x="545" y="232" class="t">ACT PREAMBLE</text>
  <text x="545" y="278" class="s">global absmax</text>
  <text x="545" y="313" class="s">XGS / XGSINV</text>
  <text x="545" y="348" class="s">NVFP4 quantize</text>
  <rect x="530" y="374" width="240" height="32" class="tag"/>
  <text x="548" y="397" class="xs">30 regs / 0 spills</text>

  <rect x="500" y="500" width="300" height="250" class="hot glow"/>
  <text x="535" y="552" class="t">ROUTE PREAMBLE</text>
  <text x="535" y="598" class="s">one CTA / expert</text>
  <text x="535" y="633" class="s">deterministic rank p</text>
  <text x="535" y="668" class="s">no global atomic</text>
  <rect x="530" y="694" width="240" height="32" class="tag"/>
  <text x="548" y="717" class="xs">39 regs / 0 spills</text>

  <path d="M405 300 H500" class="flow"/>
  <path d="M405 610 H500" class="flow"/>

