  <text x="1005" y="298" class="s">X4 / Sx</text>
  <text x="1005" y="332" class="s">forward: topk_off</text>
  <text x="1005" y="366" class="s">inverse: token_idx</text>
  <path d="M895 455 L970 345" class="flow"/>

