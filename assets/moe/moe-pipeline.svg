  <polygon points="970,205 1215,205 1265,165 1020,165" class="soft"/>
  <polygon points="970,205 1215,205 1215,415 970,415" class="edge"/>
  <polygon points="1215,205 1265,165 1265,375 1215,415" class="soft"/>
